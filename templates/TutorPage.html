<!DOCTYPE html> 
<body>
    <link rel="stylesheet" href="static/style.css">

    <Title>Ako Island Registry</Title>
    <div class="heading">
    <h1 class="mainhead">Ako Connect</h1>
    <h2 class="secondhead">Connecting students since 2025</h2>  
    


    </div>


    <div class="navbar">
        <a href="{{ url_for('HomePage')}}">Home</a>
        <a href="{{ url_for('Resources')}}">Resources</a>

        

    </div>


    <div>

    <form action="/confirmbooking" method="GET">

        <label for="TutorSelect">Choose a Tutor:</label>

        <select name="choice" id="TutorSelect">
            <option value="1" id="optionmeng">Meng</option>
            <option value="2" id="optionkevin">Kevin</option>
        </select>

        <button type="submit">Select Tutor</button>

    </form>

    {% if tutorinfo %}
        <h1>{{ tutorinfo[1] }}</h1>
    {% else %}
        <p>No tutor selected</p>
    {% endif %}

</div>



</body>
