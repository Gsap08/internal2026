<!DOCTYPE html> 
<body>

    <link rel="stylesheet" href="static/style.css">

    <Title>Ako Island Registry</Title>
    <div class="heading">
    <h1 class="mainhead">Ako Connect</h1>
    <h2 class="secondhead">Connecting students since 2025</h2>  
    


    </div>


    <div class="navbar">
        <a href="{{ url_for('HomePage')}}">Home</a>
        <a href="{{ url_for('Resources')}}">Resources</a>

        

    </div>


    <div>
        {% if dash_info %}
    <table border="1">
        <tr>
            <th>Tutor</th>
            <th>Timeslot</th>
            <th>Subject</th>
        </tr>

        {% for booking in dash_info %}
        <tr>
            <td>{{ booking["tutor_name"] }}</td>
            <td>{{ booking["timeslot"] }}</td>
            <td>{{ booking["subject"] }}</td>
        </tr>
        {% endfor %}
    </table>

{% else %}
    <p>You have no bookings yet.</p>
{% endif %}
    </div>


</body>
